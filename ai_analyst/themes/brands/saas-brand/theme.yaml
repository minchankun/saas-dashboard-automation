# SaaS Brand theme
# Primary brand color: Amber #F59E0B
# Inherits from themes/_base.yaml — only overrides are listed here.
# Load with: load_theme("saas-brand", themes_dir="themes")

theme:
  name: "saas-brand"
  display_name: "SaaS Brand"
  description: "Amber-primary brand theme. Amber #F59E0B as primary, navy #0F1729 as dark anchor."

colors:
  primary: "#F59E0B"          # Amber — key data, call-to-action, primary brand
  primary_dark: "#D97706"     # Amber dark — buttons, gradients
  primary_darker: "#B45309"   # Amber darker — text on light amber bg
  primary_light: "#FEF3C7"    # Amber light — badge backgrounds, tints
  secondary: "#0F1729"        # Navy — dark band, cover background
  accent: "#EF4444"           # Red — alerts, errors, negative
  background: "#F5F5F0"       # Off-white — page background
  text: "#1A202C"             # Dark — body text
  text_light: "#64748B"       # Muted — captions, annotations

  # Chart highlight colors (SWD section-semantic)
  highlight:
    descriptive: "#F59E0B"    # Amber — "What happened"
    diagnostic:  "#EF4444"    # Red   — "Why it happened"
    predictive:  "#10B981"    # Green — "What's next"
    event:       "#F97316"    # Orange — anomaly markers
    gray:        "#D1D5DB"    # Non-highlighted series

  # Categorical palette — amber replaces blue as primary
  categorical:
    - "#F59E0B"   # amber (brand primary)
    - "#10B981"   # green
    - "#7C3AED"   # purple
    - "#EF4444"   # red
    - "#F97316"   # orange
    - "#0D9488"   # teal
    - "#D97706"   # amber dark
    - "#64748B"   # muted gray

  sequential:
    low:  "#FEF3C7"            # Light amber tint
    mid:  "#F59E0B"            # Mid amber
    high: "#92400E"            # Dark amber

  diverging:
    negative: "#EF4444"        # Red — decline, loss
    neutral:  "#F5F5F0"        # Off-white — midpoint
    positive: "#10B981"        # Green — growth, improvement

presentations:
  slide_background: "#F5F5F0"
  slide_text: "#1A202C"
  slide_accent: "#F59E0B"      # Amber accent elements
  dark:
    slide_background: "#0F1729"
    slide_text: "#F5F5F0"
    slide_accent: "#FCD34D"    # Lighter amber for dark bg
